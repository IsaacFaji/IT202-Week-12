<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog Breed AJAX Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    label, input {
      font-size: 18px;
    }

    input {
      padding: 8px;
      width: 280px;
      margin-top: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
  </style>

  <script>
    function checkBreed(str) {
      const result = document.getElementById("result");

      if (str.length === 0) {
        result.innerHTML = "Start typing a dog breed name...";
        return;
      }

      const xhr = new XMLHttpRequest();

      xhr.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
          result.innerHTML = this.responseText;
        }
      };

      xhr.open("GET", "checkbreed.php?q=" + encodeURIComponent(str), true);
      xhr.send();
    }
  </script>
</head>
<body>
  <h2>Dog Breed Finder</h2>

  <form>
    <label for="breed">Enter a dog breed:</label><br>
    <input
      type="text"
      id="breed"
      name="breed"
      onkeyup="checkBreed(this.value)"
      placeholder="Type a dog breed name"
      autocomplete="off"
    >
  </form>

  <div id="result">Start typing a dog breed name...</div>
</body>
</html>
